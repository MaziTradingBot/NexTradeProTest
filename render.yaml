# Render Blueprint for the NexTradePro API.
# Database can be Render Postgres or an external Neon connection string.
services:
  - type: web
    name: nextradepro-api
    runtime: node
    plan: free
    rootDir: apps/api
    # --include=dev is required because NODE_ENV=production makes npm skip
    # devDependencies (prisma, typescript, tsx) that the build/seed need.
    buildCommand: npm install --include=dev && npm run build
    # On boot: sync schema (--accept-data-loss lets destructive schema changes,
    # e.g. new unique constraints, apply on an existing demo DB) + seed. Both are
    # made non-fatal so the API ALWAYS starts even if a step hiccups.
    startCommand: (npx prisma db push --accept-data-loss || echo push-skipped) && (npm run seed || echo seed-skipped) && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
