# Render Blueprint for the NexTradePro API.
# Database can be Render Postgres or an external Neon connection string.
services:
  - type: web
    name: nextradepro-api
    runtime: node
    plan: free
    rootDir: apps/api
    # --include=dev is required because NODE_ENV=production makes npm skip
    # devDependencies (prisma, typescript, tsx) that the build/seed need.
    buildCommand: npm install --include=dev && npm run build
    # On boot: sync schema (no migration files needed) + seed roles/permissions/
    # demo data (idempotent). Seed failure is tolerated so the API still starts.
    startCommand: npx prisma db push && (npm run seed || echo seed-skipped) && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
